<section *ngIf="isSuperAdmin && panelState.activeSection === 'cmd'" class="section-content cmd-section">
  <div class="cmd-header">
    <div class="cmd-header-left">
      <span class="cmd-title">C:\Windows\System32\cmd.exe</span>
    </div>
    <div class="cmd-header-right">
      <span class="cmd-badge">SUPERADMIN</span>
    </div>
  </div>

  <div class="cmd-body" #cmdOutput (scroll)="onBodyScroll()">
    <div *ngFor="let line of lines" class="cmd-line"
         [class.cmd-line-input]="line.type === 'input'"
         [class.cmd-line-output]="line.type === 'output'"
         [class.cmd-line-error]="line.type === 'error'"
         [class.cmd-line-system]="line.type === 'system'"
         [class.cmd-line-success]="line.type === 'success'">
      <span class="cmd-time" *ngIf="line.type === 'input'">{{ formatTime(line.timestamp) }}</span>
      <pre class="cmd-text">{{ line.text }}</pre>
    </div>

    <div class="cmd-input-line" (click)="focusInput()">
      <span class="cmd-prompt">C:\Users\dev&gt;</span>
      <input #cmdInput
             type="text"
             [(ngModel)]="currentInput"
             (keydown)="onKeyDown($event)"
             class="cmd-input"
             [disabled]="isExecuting"
             autocomplete="off"
             spellcheck="false">
      <span class="cmd-cursor" [class.cmd-cursor-hidden]="!showCursor && !isExecuting">&block;</span>
    </div>
  </div>
</section>
