<section class="section-content">
  <div class="section-header">
    <div>
      <h1>Notificaciones</h1>
      <p>Centro de notificaciones y alertas</p>
    </div>
    <button class="btn-primary" *ngIf="unreadNotifCount > 0" (click)="markAllNotifsRead()">
      <i class="fas fa-check-double"></i> Marcar todo leído
    </button>
  </div>

  <div class="card">
    <div class="empty-state" *ngIf="apiNotifications.length === 0">
      <i class="fas fa-bell-slash empty-icon"></i>
      <h3>Sin notificaciones</h3>
      <p>Las notificaciones aparecerán aquí</p>
    </div>
    <div class="notifications-list" *ngIf="apiNotifications.length > 0">
      <div
        class="notif-item"
        *ngFor="let notif of apiNotifications"
        [class.unread]="!notif.isRead"
        (click)="markNotifRead(notif._id)"
        style="cursor: pointer;"
      >
        <div class="notif-icon" [ngClass]="{
          'notif-cyan': notif.type === 'info',
          'notif-lime': notif.type === 'success',
          'notif-pink': notif.type === 'warning',
          'notif-red': notif.type === 'error'
        }">
          <i [class]="notif.icon"></i>
        </div>
        <div class="notif-content">
          <h4>{{ notif.title }}</h4>
          <p>{{ notif.message }}</p>
          <span class="notif-time">{{ notif.createdAt | date:'dd MMM HH:mm' }}</span>
        </div>
        <div *ngIf="!notif.isRead" style="width: 8px; height: 8px; border-radius: 50%; background: #22d3ee; flex-shrink: 0;"></div>
      </div>
    </div>
  </div>
</section>
